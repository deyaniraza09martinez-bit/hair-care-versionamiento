<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Hair Care</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #ffe4ef, #f7f3f8);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor{
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 45px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo img{
            width: 150px;
            margin-bottom: 20px;
        }

        h1{
            color: #e91e63;
            margin-bottom: 15px;
            font-size: 38px;
        }

        p{
            color: #666;
            line-height: 1.7;
            margin-bottom: 30px;
            font-size: 17px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input{
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        input:focus{
            border-color: #e91e63;
        }

        button{
            background: linear-gradient(to right, #ff4f93, #e91e63);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            opacity: 0.9;
        }

        .volver{
            margin-top: 25px;
        }

        .volver a{
            text-decoration: none;
            color: #e91e63;
            font-weight: bold;
        }

        .volver a:hover{
            text-decoration: underline;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <!-- LOGO -->

        <div class="logo">

            <img src="img/logo.png" alt="Hair Care">

        </div>

        <!-- TITULO -->

        <h1>Recuperar Contraseña</h1>

        <p>
            Ingresa tu correo electrónico y te enviaremos instrucciones
            para restablecer tu contraseña.
        </p>

        <!-- FORMULARIO -->

        <form>

            <input 
                type="email" 
                placeholder="Ingresa tu correo electrónico"
                required
            >

            <button type="submit">
                Enviar instrucciones
            </button>

        </form>

        <!-- VOLVER -->

        <div class="volver">

            <a href="login.html">
                Volver al inicio de sesión
            </a>

        </div>

    </div>

</body>

</html>
