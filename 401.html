<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Error 404 | Hair Care</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #ffe4ef, #f7f3f8);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #333;
        }

        .contenedor{
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);

            max-width: 700px;
        }

        .contenedor img{
            width: 180px;
            margin-bottom: 20px;
        }

        h1{
            font-size: 100px;
            color: #e91e63;
        }

        h2{
            font-size: 40px;
            margin-bottom: 20px;
        }

        p{
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .btn{
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(to right, #ff4f93, #e91e63);
            color: white;
            padding: 15px 30px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <img src="img/logo.png" alt="Logo Hair Care">

        <h1>404</h1>

        <p>
